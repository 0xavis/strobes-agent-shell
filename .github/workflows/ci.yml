name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m py_compile strobes_shell_agent/cli.py strobes_shell_agent/client.py strobes_shell_agent/executor.py strobes_shell_agent/config.py

      - name: Test
        run: pytest tests/ -v --tb=short || echo "No tests yet"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t strobes/shell-agent:latest .

      - name: Verify image runs
        run: docker run --rm strobes/shell-agent:latest --version
