name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build standalone executables for each platform
  build-executables:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: strobes-shell-agent-linux-amd64
            pyinstaller_args: ""
          - os: macos-13
            asset_name: strobes-shell-agent-macos-amd64
            pyinstaller_args: ""
          - os: macos-14
            asset_name: strobes-shell-agent-macos-arm64
            pyinstaller_args: ""
          - os: windows-latest
            asset_name: strobes-shell-agent-windows-amd64.exe
            pyinstaller_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --name "${{ matrix.asset_name }}" \
            --hidden-import=strobes_shell_agent \
            --hidden-import=strobes_shell_agent.executor \
            --hidden-import=strobes_shell_agent.client \
            --hidden-import=strobes_shell_agent.config \
            strobes_shell_agent/__main__.py
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  # Build and push Docker image
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

  # Create GitHub Release with all artifacts
  release:
    runs-on: ubuntu-latest
    needs: [build-executables, build-docker]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/strobes-shell-agent-linux-amd64/*
            artifacts/strobes-shell-agent-macos-amd64/*
            artifacts/strobes-shell-agent-macos-arm64/*
            artifacts/strobes-shell-agent-windows-amd64.exe/*
          body: |
            ## Installation

            ### Pre-built binaries (no Python needed)
            Download the binary for your platform, make it executable, and run:
            ```bash
            chmod +x strobes-shell-agent-*
            ./strobes-shell-agent-linux-amd64 connect --url https://app.strobes.co --api-key YOUR_KEY --org-id YOUR_ORG
            ```

            ### pip
            ```bash
            pip install strobes-shell-agent
            strobes-shell-agent connect
            ```

            ### Docker
            ```bash
            docker run --rm --env-file .env ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} connect
            ```

            ### Docker Compose
            ```yaml
            services:
              shell-agent:
                image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                env_file: .env
                restart: unless-stopped
            ```

  # Publish to PyPI
  publish-pypi:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
